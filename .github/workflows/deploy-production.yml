name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  backup-production-db:
    name: Backup production database
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create production backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL_PRODUCTION }}
        run: |
          mkdir -p backups
          pg_dump "$DATABASE_URL" --format=custom --no-owner --no-acl --file "backups/planalityc-production-${GITHUB_SHA}.dump"

      - name: Upload database backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-db-backup-${{ github.sha }}
          path: backups/*.dump
          retention-days: 14

  deploy-api:
    name: Deploy API to production
    runs-on: ubuntu-latest
    needs:
      - backup-production-db
    environment:
      name: production
    defaults:
      run:
        working-directory: artifacts/api-server
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: artifacts/api-server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID_PRODUCTION }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy API production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_API_PROJECT_ID_PRODUCTION }}
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}

  deploy-frontend:
    name: Deploy frontend to production
    runs-on: ubuntu-latest
    needs:
      - deploy-api
    environment:
      name: production
    defaults:
      run:
        working-directory: artifacts/proptech
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: artifacts/proptech/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build
        env:
          NODE_ENV: production
          VITE_API_URL: ${{ vars.VITE_API_URL_PRODUCTION }}
        run: npm run build

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel production environment
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID_PRODUCTION }}
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy frontend production
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID_PRODUCTION }}
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
