name: Deploy Frontend → Vercel (staging)

on:
  push:
    branches: [develop]
    paths:
      - 'artifacts/proptech/**'
      - '.github/workflows/deploy-staging-frontend.yml'

jobs:
  deploy:
    name: Deploy planalityc-ai-staging
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Staging
        run: |
          vercel deploy --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: team_qAoTAQ23XcOvbSRXVfeWOmWa
          VERCEL_PROJECT_ID: prj_koB00Oze8NNfMthXmWc3mnYUC7eI
