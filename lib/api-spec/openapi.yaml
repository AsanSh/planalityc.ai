openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Planalityc.ai API
  version: 0.1.0
  description: Planalityc.ai Platform API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: companies
    description: Company management
  - name: users
    description: User management
  - name: counterparties
    description: Counterparty management
  - name: properties
    description: Property management
  - name: contracts
    description: Contract management
  - name: documents
    description: Document management
  - name: import
    description: Excel import
  - name: rental
    description: Rental management
  - name: dashboard
    description: Dashboard & analytics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # AUTH
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # COMPANIES
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List companies
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCompanyBody"
      responses:
        "201":
          description: Company created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{id}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCompanyBody"
      responses:
        "200":
          description: Updated company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # USERS
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: createUser
      tags: [users]
      summary: Create user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserBody"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserBody"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # COUNTERPARTIES
  /counterparties:
    get:
      operationId: listCounterparties
      tags: [counterparties]
      summary: List counterparties
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of counterparties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Counterparty"
    post:
      operationId: createCounterparty
      tags: [counterparties]
      summary: Create counterparty
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCounterpartyBody"
      responses:
        "201":
          description: Counterparty created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Counterparty"

  /counterparties/{id}:
    get:
      operationId: getCounterparty
      tags: [counterparties]
      summary: Get counterparty
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Counterparty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Counterparty"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateCounterparty
      tags: [counterparties]
      summary: Update counterparty
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCounterpartyBody"
      responses:
        "200":
          description: Updated counterparty
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Counterparty"
    delete:
      operationId: deleteCounterparty
      tags: [counterparties]
      summary: Delete counterparty
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # PROPERTIES
  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List properties
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: project
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Property created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated property
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # CONTRACTS
  /contracts:
    get:
      operationId: listContracts
      tags: [contracts]
      summary: List contracts
      parameters:
        - name: type
          in: query
          schema:
            type: string
        - name: counterpartyId
          in: query
          schema:
            type: integer
        - name: propertyId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Contract"
    post:
      operationId: createContract
      tags: [contracts]
      summary: Create contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContractBody"
      responses:
        "201":
          description: Contract created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"

  /contracts/{id}:
    get:
      operationId: getContract
      tags: [contracts]
      summary: Get contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateContract
      tags: [contracts]
      summary: Update contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateContractBody"
      responses:
        "200":
          description: Updated contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Contract"
    delete:
      operationId: deleteContract
      tags: [contracts]
      summary: Delete contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # DOCUMENTS
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List documents
      parameters:
        - name: entityType
          in: query
          schema:
            type: string
        - name: entityId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: createDocument
      tags: [documents]
      summary: Upload document
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDocumentBody"
      responses:
        "201":
          description: Document created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # IMPORT
  /import/jobs:
    get:
      operationId: listImportJobs
      tags: [import]
      summary: List import jobs
      responses:
        "200":
          description: List of import jobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ImportJob"

  /import/preview:
    post:
      operationId: previewImport
      tags: [import]
      summary: Preview import data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportPreviewBody"
      responses:
        "200":
          description: Preview result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportPreviewResponse"

  /import/commit:
    post:
      operationId: commitImport
      tags: [import]
      summary: Commit import
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommitImportBody"
      responses:
        "200":
          description: Import result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"

  /import/jobs/{id}:
    get:
      operationId: getImportJob
      tags: [import]
      summary: Get import job detail
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Import job
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportJob"

  # RENTAL - TENANTS
  /rental/tenants:
    get:
      operationId: listTenants
      tags: [rental]
      summary: List tenants
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of tenants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tenant"
    post:
      operationId: createTenant
      tags: [rental]
      summary: Create tenant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTenantBody"
      responses:
        "201":
          description: Tenant created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  /rental/tenants/{id}:
    get:
      operationId: getTenant
      tags: [rental]
      summary: Get tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateTenant
      tags: [rental]
      summary: Update tenant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTenantBody"
      responses:
        "200":
          description: Updated tenant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tenant"

  # RENTAL - LEASE CONTRACTS
  /rental/contracts:
    get:
      operationId: listLeaseContracts
      tags: [rental]
      summary: List lease contracts
      parameters:
        - name: propertyId
          in: query
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of lease contracts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaseContract"
    post:
      operationId: createLeaseContract
      tags: [rental]
      summary: Create lease contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeaseContractBody"
      responses:
        "201":
          description: Lease contract created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseContract"

  /rental/contracts/{id}:
    get:
      operationId: getLeaseContract
      tags: [rental]
      summary: Get lease contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Lease contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseContract"
    patch:
      operationId: updateLeaseContract
      tags: [rental]
      summary: Update lease contract
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLeaseContractBody"
      responses:
        "200":
          description: Updated lease contract
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LeaseContract"

  # RENTAL - ACCRUALS
  /rental/accruals:
    get:
      operationId: listAccruals
      tags: [rental]
      summary: List accruals
      parameters:
        - name: leaseContractId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of accruals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Accrual"

  /rental/accruals/recalculate:
    post:
      operationId: recalculateAccruals
      tags: [rental]
      summary: Recalculate accruals for a lease contract
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RecalculateAccrualsBody"
      responses:
        "200":
          description: Recalculated accruals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Accrual"

  # RENTAL - PAYMENTS
  /rental/payments:
    get:
      operationId: listPayments
      tags: [rental]
      summary: List rental payments
      parameters:
        - name: leaseContractId
          in: query
          schema:
            type: integer
        - name: tenantId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"
    post:
      operationId: createPayment
      tags: [rental]
      summary: Record rental payment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePaymentBody"
      responses:
        "201":
          description: Payment recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # RENTAL - DEPOSITS
  /rental/deposits:
    get:
      operationId: listDeposits
      tags: [rental]
      summary: List deposits
      parameters:
        - name: leaseContractId
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of deposits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Deposit"
    post:
      operationId: createDeposit
      tags: [rental]
      summary: Record deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDepositBody"
      responses:
        "201":
          description: Deposit recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  /rental/deposits/{id}:
    patch:
      operationId: updateDeposit
      tags: [rental]
      summary: Update deposit status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDepositBody"
      responses:
        "200":
          description: Updated deposit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Deposit"

  # RENTAL - EXPENSES
  /rental/expenses:
    get:
      operationId: listExpenses
      tags: [rental]
      summary: List rental expenses
      parameters:
        - name: propertyId
          in: query
          schema:
            type: integer
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [rental]
      summary: Record expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Expense recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  # RENTAL - PROPERTIES (with rental status)
  /rental/properties:
    get:
      operationId: listRentalProperties
      tags: [rental]
      summary: List properties with rental info
      parameters:
        - name: rentalStatus
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of rental properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RentalProperty"

  /rental/properties/{id}/activate:
    post:
      operationId: activateRentalProperty
      tags: [rental]
      summary: Activate property for rental
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property activated for rental
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RentalProperty"

  /rental/properties/{id}/performance:
    get:
      operationId: getPropertyPerformance
      tags: [rental]
      summary: Get property rental performance
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyPerformance"

  # RENTAL - STATEMENTS
  /rental/statements:
    get:
      operationId: listOwnerStatements
      tags: [rental]
      summary: List owner statements
      parameters:
        - name: propertyId
          in: query
          schema:
            type: integer
        - name: month
          in: query
          schema:
            type: string
      responses:
        "200":
